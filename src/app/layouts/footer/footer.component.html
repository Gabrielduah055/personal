<footer class="border-t border-gray-200 bg-white py-12">
  <div class="mx-auto max-w-[1290px] px-6 sm:px-10">
    <div class="flex flex-col items-center justify-center gap-6 md:flex-row md:justify-between">
      <div class="flex flex-wrap justify-center gap-2">
        <a
          *ngFor="let social of socialLinks"
          [href]="social.href"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="social.label"
          class="footer-social"
        >
          <span *ngIf="social.peerlist; else footerSocialIcon" class="footer-peerlist">P</span>
          <ng-template #footerSocialIcon>
            <i [class]="social.icon"></i>
          </ng-template>
        </a>
      </div>

      <p class="text-center text-sm text-gray-500">
        © {{ currentYear }} Gabriel Duah. Built with intentionality.
      </p>
    </div>
  </div>
</footer>
