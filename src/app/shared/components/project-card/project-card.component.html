<div
  @cardHover
  class="group relative overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm transition-all duration-300 hover:shadow-lg"
>
  <!-- Image -->
  <div class="project-preview relative h-56 overflow-hidden bg-gray-100">
    <img
      [src]="project.image"
      [alt]="project.title"
      class="project-preview-image block w-full min-h-full object-cover object-top"
    />
    <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/10 via-transparent to-white/5"></div>
  </div>

  <!-- Content -->
  <div class="p-5">
    <div class="mb-2 flex items-center justify-between gap-3">
      <h3 class="text-lg font-semibold leading-tight text-black">{{ project.title }}</h3>
      <span class="shrink-0 text-[10px] font-medium uppercase text-gray-500">{{ project.technologies[0] }}</span>
    </div>
    <p class="mb-4 min-h-[44px] text-sm leading-[1.5] text-gray-600">{{ project.shortDescription }}</p>

    <!-- Technologies -->
    <div class="mb-4 flex min-h-7 flex-wrap gap-1.5">
      <span
        *ngFor="let tech of project.technologies.slice(1, 3)"
        class="inline-block rounded border border-gray-300 bg-gray-50 px-2 py-1 text-[10px] text-gray-600"
      >
        {{ tech }}
      </span>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3">
      <a
        [routerLink]="['/project', project.id]"
        class="flex-1 rounded bg-gray-900 px-4 py-2 text-center text-sm font-semibold text-white transition-colors hover:bg-gray-800"
      >
        View Details
      </a>
      <a
        [href]="project.livePreview"
        target="_blank"
        class="flex items-center justify-center rounded border border-gray-300 px-4 py-2 text-sm font-semibold text-gray-700 transition-colors hover:bg-gray-100"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
        </svg>
      </a>
    </div>
  </div>
</div>
